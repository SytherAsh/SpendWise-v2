spring:
  application:
    name: spendwise-backend
  profiles:
    active: local
  threads:
    virtual:
      enabled: true # ADR-009 — Project Loom virtual threads, Spring Boot 3.2+

  # SPRING_DATASOURCE_* are not part of the docs/deployment.md env var list —
  # that list documents SUPABASE_URL/SUPABASE_KEY, which are Supabase's
  # client-SDK/REST credentials, not a raw JDBC connection. Flyway and
  # Spring's DataSource need an actual JDBC URL + credentials, so these three
  # vars fill that gap. Defaults below point at the local Docker Postgres in
  # backend/docker-compose.yml so `./gradlew bootRun` works with zero env
  # vars set locally. Production sets these to the real Supabase Postgres
  # connection string (see implementation/epics/epic-12-deployment-and-launch.md
  # E12-S1-T4).
  datasource:
    # Note: the JVM's default timezone must also be forced to UTC (see
    # build.gradle.kts bootRun/test jvmArgs) — pgjdbc sends it as the
    # Postgres "TimeZone" startup parameter, and older zone aliases (e.g.
    # this machine's "Asia/Calcutta") are rejected by Postgres outright.
    # Connects as spendwise_app, NOT the postgres superuser — see
    # db-init/01-app-role.sql for why (Postgres superusers always bypass
    # Row-Level Security, which would silently defeat V5__row_level_security.sql).
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5433/spendwise}
    username: ${SPRING_DATASOURCE_USERNAME:spendwise_app}
    password: ${SPRING_DATASOURCE_PASSWORD:spendwise_app_password}

  flyway:
    enabled: true
    locations: classpath:db/migration

  # Alerts' SMTP dispatch (E5-S3-T2) — provider-agnostic (docs/requirements.md leaves the actual
  # SMTP provider "TBD at implementation"); any host/port/user/pass pair works here (Gmail app
  # password, a free-tier transactional-email provider, MailHog locally, etc.). Empty defaults are
  # intentional — sending fails gracefully (AlertDispatchService logs and leaves delivered_at
  # null) rather than crashing the evaluator job when unset, same pattern as ML_INTERNAL_KEY below.
  mail:
    host: ${EMAIL_SMTP_HOST:}
    port: ${EMAIL_SMTP_PORT:587}
    username: ${EMAIL_SMTP_USER:}
    password: ${EMAIL_SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

server:
  port: 8080

app:
  datasource:
    # Second connection pool — same host/port/database as the primary connection above
    # (JobsDataSourceConfig derives the URL from the same JdbcConnectionDetails bean, so
    # this also works under Testcontainers), a different role (db-init/02-jobs-role.sql)
    # with BYPASSRLS — used ONLY by @Scheduled job beans that must read across all users
    # (E4-S3-T3/T4; see JobsDataSourceConfig and STATUS.md's Epic 4 close-out). Every
    # other bean in the app keeps using the default spendwise_app-backed DataSource
    # above, which stays fully RLS-enforced.
    jobs:
      username: ${SPRING_DATASOURCE_JOBS_USERNAME:spendwise_jobs}
      password: ${SPRING_DATASOURCE_JOBS_PASSWORD:spendwise_jobs_password}
  security:
    # Signing secret for the user session JWT (7-day access tokens). Must be
    # set via env in dev/prod; the local default below is dev-only and
    # deliberately weak/obvious so it's never mistaken for a real secret.
    jwt-secret: ${JWT_SECRET:local-dev-only-jwt-secret-do-not-use-in-prod}
    # Completely separate secret for admin-signed tokens (E1-S2 isolation
    # invariant) — never derived from or shared with jwt-secret.
    admin-jwt-secret: ${ADMIN_JWT_SECRET:local-dev-only-admin-jwt-secret-do-not-use-in-prod}
    # Single seeded admin credential (E11-S1-T1) — never a regular user account with a role
    # claim (CLAUDE.md). admin-password-hash is a bcrypt hash, checked with
    # BCryptPasswordEncoder; both empty by default so admin login is simply unusable until
    # explicitly configured, rather than shipping a guessable local default (unlike the other
    # dev-only secrets above, a guessable admin password default is a real risk even locally).
    admin-username: ${ADMIN_USERNAME:}
    admin-password-hash: ${ADMIN_PASSWORD_HASH:}
  firebase:
    project-id: ${FIREBASE_PROJECT_ID:}
    private-key: ${FIREBASE_PRIVATE_KEY:}
  mail:
    # "From" header for alert emails — defaults to the SMTP account itself, the common case for
    # a free-tier provider (e.g. a Gmail app password) where the authenticated account is also
    # the sender.
    from-address: ${EMAIL_SMTP_USER:}
  ml:
    # Internal-network URL of the FastAPI ML service (docs/deployment.md — plain
    # HTTP is fine here, X-Internal-Key is the application-layer auth). Default
    # points at `uvicorn api.main:app --port 8000` running locally.
    base-url: ${FASTAPI_ML_URL:http://localhost:8000}
    internal-key: ${ML_INTERNAL_KEY:local-dev-only-ml-internal-key-do-not-use-in-prod}
    # Not specified in docs — a /predict response below this confidence is
    # treated the same as a failed call (E4-S3-T1 DoD): left uncategorized for
    # E4-S3-T3's retry job rather than written to transaction_categories.
    low-confidence-threshold: ${ML_LOW_CONFIDENCE_THRESHOLD:0.5}
    # "Weekly (configurable)" per docs/architecture.md's Background Jobs table —
    # default fires Sunday 03:00 server time (cron: sec min hour day month weekday).
    retrain-cron: ${ML_RETRAIN_CRON:0 0 3 * * SUN}
  llm:
    # CLAUDE.md: "No vendor has been selected. Do not hardcode any LLM SDK into business
    # logic." Only "stub" exists today (LlmConfig) — a real provider is a future addition,
    # not this epic's scope. Same env-var-default pattern as app.ml.* above.
    provider: ${LLM_PROVIDER:stub}

demo:
  # Demo account feature — auto-seeds database on startup with realistic transaction data
  # Disable by setting demo.enabled=false or env var DEMO_ENABLED=false
  enabled: ${DEMO_ENABLED:true}
  phone: ${DEMO_PHONE:+919876543210}
  email: ${DEMO_EMAIL:demo@spendwise.local}
  # The demo CSV (data/demo-transactions.csv) is static and never re-uploaded, so "the real
  # current month" drifts away from it over time and every budget would show zero spend.
  # Pins the demo user's notion of "current month" (BudgetServiceImpl) to the CSV's last
  # populated month instead — update this if the CSV is ever regenerated with a different
  # date range. Must stay in sync with the frontend's hardcoded demo date-range default
  # (frontend/src/lib/date-range.tsx, DEMO_RANGE).
  frozen-month: ${DEMO_FROZEN_MONTH:2026-06}
